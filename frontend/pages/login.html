<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aspire English Hub</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="nav-brand"><span class="logo-icon">🎙️</span><span>Aspire <span class="gradient-text">English Hub</span></span></a>
    </nav>

    <div class="auth-page page">
        <div class="auth-card animate-in">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to continue your English journey</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">Sign In</button>
            </form>
            <div class="form-footer">
                <p>Don't have an account? <a href="signup.html">Sign up free</a></p>
                <p style="margin-top:8px;"><a href="#" id="forgot-link" style="font-size:0.85rem;">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            Utils.showLoading(btn, 'Signing in...');
            try {
                const data = await Auth.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                Utils.showToast('Welcome back!', 'success');
                setTimeout(() => {
                    window.location.href = data.role === 'admin' || data.role === 'super_admin' ? 'admin/dashboard.html' : 'dashboard.html';
                }, 500);
            } catch (err) {
                Utils.showToast(err.message || 'Login failed', 'error');
                Utils.hideLoading(btn);
            }
        });

        document.getElementById('forgot-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) { Utils.showToast('Enter your email first', 'warning'); return; }
            try {
                await API.post('/api/auth/reset-password', { email });
                Utils.showToast('Reset link sent to your email', 'success');
            } catch (err) { Utils.showToast('Failed to send reset link', 'error'); }
        });
    </script>
</body>
</html>
